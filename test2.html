<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="test2.css">
        <title>Acrobat Guide</title>
    </head>
    <body>
        <div class="guide-outer">
            <!-- Archetype Card -->
            <div class="archetype-card">
                <img class="archetype-card-img" src="./assets/images/assassinIcon.webp" alt="Icon">
                <span class="archetype-card-title">
                    <b>- <img src="./assets/images/classAcrobat.png" class="archetype-card-inline-icon" alt="Icon"> Acrobat -</b>
                </span>
            </div>

            <div class="guide-column">
                <div class="guide-heading"><b>-- Spell Cycle --</b></div>

                <div class="guide-subheading">- Simple Cycle -</div>
                <div class="spell-cycle-outer">
                    <div class="spell-display">
                        <img src="./assets/images/nodeRed.png" alt="Icon">
                        <div class="spell-name">Lacerate</div>
                    </div>
                    <div class="spell-in-between">></div>
                    <div class="spell-display">
                        <img src="./assets/images/nodePink.png" alt="Icon">
                        <div class="spell-name">Hop</div>
                    </div>
                    <div class="spell-in-between">></div>
                    <div class="spell-display">
                        <img src="./assets/images/nodeGreenAssassin.png" alt="Icon">
                        <div class="spell-name">Multihit</div>
                    </div>
                </div>

                <div class="guide-subheading">- Advanced Cycle -</div>
                <div class="spell-cycle-outer">
                    <div class="spell-display">
                        <img src="./assets/images/nodeRed.png" alt="Icon">
                        <div class="spell-name">Lacerate</div>
                    </div>
                    <div class="spell-in-between">></div>
                    <div class="spell-display">
                        <img src="./assets/images/nodePink.png" alt="Icon">
                        <div class="spell-name">Hop</div>
                    </div>
                    <div class="spell-in-between">></div>
                    <div class="spell-display">
                        <img src="./assets/images/nodeGreenAssassin.png" alt="Icon">
                        <div class="spell-name">Multihit</div>
                    </div>
                    <div class="spell-in-between">></div>
                    <div class="spell-display">
                        <img src="./assets/images/nodeRed.png" alt="Icon">
                        <div class="spell-name">Lacerate</div>
                    </div>
                    <div class="spell-in-between">></div>
                    <div class="spell-display">
                        <img src="./assets/images/nodeGreenAssassin.png" alt="Icon">
                        <div class="spell-name">Dash</div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
